spring.application.name=meddelivery

# ?? MySQL ??????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/med_delivery?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ????????????????????????????????????????
